# Nginx 站点配置模板
# ── 用法 ──────────────────────────────────────────────
# 1) 复制到服务器：/etc/nginx/conf.d/ai-board.conf
# 2) 把 your-domain.com 换成你的域名（可用子域名，如 board.your-domain.com）
# 3) nginx -t && systemctl reload nginx   # 先让 HTTP(80) 跑通
# 4) certbot --nginx -d your-domain.com    # 自动加 443/证书，并配置 80->443 跳转
#    （执行 certbot 后，下面这个文件会被它自动改写，无需你手动加 443 块）
# ────────────────────────────────────────────────────

server {
    listen 80;
    listen [::]:80;
    server_name yongbo.online www.yongbo.online;

    root /var/www/ai-board;
    index index.html;

    # 单页应用：找不到文件就回退到 index.html（这个项目无路由，加上也无害、更规范）
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Vite 产物的 /assets 文件名带哈希，可长缓存；index.html 不缓存，保证更新即时生效
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # gzip（可选，减小传输体积）
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
}
