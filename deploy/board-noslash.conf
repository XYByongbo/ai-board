# ⚠️ 本文件不能单独放到 /etc/nginx/conf.d/ 下使用！
# 原因：conf.d 是被 nginx 的 http {} 块直接 include 的，裸 location 指令
#       必须放在 server {} 内，否则 reload 会报：
#       "location directive is not allowed here"
#
# ✅ 正确用法：把下面的 location 片段并入 /etc/nginx/conf.d/ai-board.conf
#   的 server {} 块内（紧挨 `location /board/ {` 之前），让
#   https://yongbo.online/board（无尾斜杠）直接打开应用、不 301 跳转。
#   （已在服务器上通过 python 脚本插入 ai-board.conf 生效）
#
# ---- 需并入 ai-board.conf 的片段（推荐用内部重写，避免 alias 路径拼接坑）----
#     location = /board {
#         rewrite ^ /board/ last;
#     }
# 说明：last 是内部重写，浏览器 URL 保持 /board 不变（不 301 跳转），
#       由现有 location /board/ 返回 index.html。
