# Brotli 压缩配置（HTTP 级，对所有 server 生效，包括 certbot 加的 443）
# 前提：服务器已安装 libnginx-mod-brotli（见 deploy 步骤）
# Brotli 压缩率通常优于 gzip，可进一步减小 JS/CSS/JSON 等静态资源传输体积
brotli on;
brotli_comp_level 6;
brotli_min_length 1024;
brotli_types
    text/plain
    text/css
    application/javascript
    application/json
    application/xml
    image/svg+xml
    application/wasm;
